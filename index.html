<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Plumber Quest</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="game.js" defer></script>
</head>

<body>

<header>
<h1>🍄 Plumber Quest</h1>

<div class="auth">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>
</header>

<main>

<canvas id="game" width="960" height="540"></canvas>

<div class="panel">

<h2>🎮 Player</h2>
<p id="userText">Chưa đăng nhập</p>
<p>Coins: <span id="coinText">0</span></p>
<p>Skin: <span id="skinText">Classic</span></p>

<button onclick="startGame()">Start Game</button>
<button onclick="saveCloud()">Save Cloud</button>

<h2>🛒 Shop</h2>

<button onclick="buySkin('Classic',0)">Classic</button>
<button onclick="buySkin('Mario',50)">Mario</button>
<button onclick="buySkin('Entity',100)">Entity</button>
<button onclick="buySkin('Ghost',150)">Ghost</button>

<h2>🏆 Leaderboard</h2>
<div id="leaderboard">Loading...</div>

</div>

</main>

</body>
</html>
