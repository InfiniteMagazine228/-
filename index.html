<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coin Runner</title>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1057751843910706" crossorigin="anonymous"></script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    h1 { margin-top:10px; }

    canvas {
      background:#111827;
      border-radius:10px;
      margin-top:10px;
    }

    .panel {
      margin-top:10px;
    }

    button {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

    .stats {
      margin-top:10px;
      font-size:18px;
    }

    .menu {
      position:fixed;
      bottom:10px;
      left:10px;
      font-size:14px;
    }
  </style>
</head>
<body>

<h1>🎮 Coin Runner</h1>
<p>Nhấn SPACE hoặc nút Nhảy để chơi</p>

<canvas id="game" width="400" height="300"></canvas>

<div class="panel">
  <button onclick="jump()">⬆ Nhảy</button>
  <button onclick="watchAd()">📺 Xem QC +25 xu</button>
  <button onclick="buySkin()">💰 Mua Skin (50 xu)</button>
</div>

<div class="stats">
  Xu: <span id="coins">0</span> | Skin: <span id="skin">Basic</span>
</div>

<div class="menu">
  <a href="/about.html">About</a> |
  <a href="/privacy.html">Privacy</a>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let player = {x:50,y:200,w:30,h:30,vy:0};
let gravity = 0.6;
let coins = Number(localStorage.getItem('coins')||0);
let skin = localStorage.getItem('skin')||'Basic';
let obstacles = [];
let gameRunning = true;

function updateUI(){
  document.getElementById('coins').textContent = coins;
  document.getElementById('skin').textContent = skin;
}
updateUI();

function jump(){
  if(player.y >= 200){
    player.vy = -10;
  }
}

window.addEventListener('keydown', e=>{
  if(e.code==='Space') jump();
});

function spawnObstacle(){
  if(Math.random()<0.02){
    obstacles.push({x:400,y:220,w:20,h:20});
  }
}

function update(){
  if(!gameRunning) return;

  ctx.clearRect(0,0,400,300);

  // player physics
  player.vy += gravity;
  player.y += player.vy;

  if(player.y > 200){
    player.y = 200;
    player.vy = 0;
  }

  // draw player
  ctx.fillStyle = skin==='Gold' ? 'gold' : 'lime';
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // obstacles
  spawnObstacle();

  obstacles.forEach(o=>{
    o.x -= 3;
    ctx.fillStyle='red';
    ctx.fillRect(o.x,o.y,o.w,o.h);

    // collision
    if(player.x < o.x+o.w && player.x+player.w > o.x && player.y < o.y+o.h && player.y+player.h > o.y){
      gameRunning = false;
      alert('💀 Game Over');
    }
  });

  obstacles = obstacles.filter(o=>o.x>-20);

  requestAnimationFrame(update);
}
update();

function watchAd(){
  if(typeof adBreak !== 'function'){
    alert('QC chưa sẵn sàng');
    return;
  }

  adBreak({
    type:'reward',
    name:'reward',
    beforeReward: showAdFn => showAdFn(),
    adViewed: ()=>{
      coins += 25;
      localStorage.setItem('coins', coins);
      updateUI();
      alert('+25 xu');
    }
  });
}

function buySkin(){
  if(coins < 50){
    alert('Không đủ xu');
    return;
  }
  coins -= 50;
  skin = 'Gold';
  localStorage.setItem('coins', coins);
  localStorage.setItem('skin', skin);
  updateUI();
}
</script>

</body>
</html>
