<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Plumber Quest PRO HD - Yah Games</title>
<meta name="description" content="Game platformer hiện đại miễn phí. Chạy nhảy, ăn xu, vượt màn, đăng nhập online, leaderboard và skin cực đẹp.">

<link rel="stylesheet" href="style.css">

<!-- Adsense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1057751843910706" crossorigin="anonymous"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="topbar">
  <div class="logo">🍄 Plumber Quest PRO HD</div>

  <nav>
    <a href="about.html">About</a>
    <a href="privacy.html">Privacy</a>
    <a href="https://paypal.me/HAThi247/1" target="_blank">Ủng hộ ❤️</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-left">
    <h1>Mario-like hiện đại cực đẹp</h1>
    <p>Chạy, nhảy, ăn xu, mở skin, vượt 5 thế giới và leo top leaderboard online.</p>
  </div>

  <div class="hero-right">
    <div class="card auth-box">
      <h3>Tài khoản</h3>

      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Mật khẩu">

      <button id="registerBtn" class="blue">Đăng ký</button>
      <button id="loginBtn" class="green">Đăng nhập</button>
      <button id="logoutBtn" class="red">Đăng xuất</button>

      <div id="userBox">Chưa đăng nhập</div>
    </div>
  </div>
</section>

<section class="main-layout">

  <div class="left">

    <div class="card">
      <canvas id="game" width="960" height="540"></canvas>

      <div class="mobile">
        <button id="leftBtn">⬅</button>
        <button id="jumpBtn">⬆</button>
        <button id="rightBtn">➡</button>
      </div>
    </div>

    <div class="card ad-card">
      <div class="ad-title">Quảng cáo</div>

      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-1057751843910706"
           data-ad-slot="6646434479"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>

      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

  </div>

  <aside class="right">

    <div class="card stats">

      <div class="stat">
        <span>Điểm</span>
        <strong id="score">0</strong>
      </div>

      <div class="stat">
        <span>Xu</span>
        <strong id="coins">0</strong>
      </div>

      <div class="stat">
        <span>Level</span>
        <strong id="level">1</strong>
      </div>

      <div class="stat">
        <span>Skin</span>
        <strong id="skinName">Classic</strong>
      </div>

    </div>

    <div class="card">
      <button id="startBtn" class="green">▶ Chơi ngay</button>
      <button id="saveBtn" class="blue">☁ Save Cloud</button>
      <button id="helpBtn" class="gray">❔ Hướng dẫn</button>
    </div>

    <div class="card">
      <h3>Shop Skin</h3>

      <button class="skinBtn red" data-skin="Classic">Classic (Free)</button>
      <button class="skinBtn yellow" data-skin="Gold">Gold (100 xu)</button>
      <button class="skinBtn purple" data-skin="Ninja">Ninja (200 xu)</button>
      <button class="skinBtn green" data-skin="Frog">Frog (300 xu)</button>
      <button class="skinBtn blue" data-skin="Galaxy">Galaxy (500 xu)</button>
    </div>

    <div class="card">
      <h3>🏆 Leaderboard</h3>
      <ol id="leaderboard"></ol>
    </div>

  </aside>

</section>

<footer>
© 2026 Yah Games • Plumber Quest PRO HD
</footer>

<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="leaderboard.js"></script>
<script src="game.js"></script>

</body>
</html>
