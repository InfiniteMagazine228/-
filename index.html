<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coin Runner</title>

  <!-- Google Ads -->
  <script async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1057751843910706"
    crossorigin="anonymous"></script>

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; text-align:center; }
    canvas { background:#111827; margin-top:20px; border-radius:10px; }
    button { padding:10px; margin:5px; border:none; border-radius:8px; cursor:pointer; }
  </style>
</head>
<body>

<h1>Coin Runner</h1>

<canvas id="game" width="400" height="300"></canvas>

<div>
  <button onclick="jump()">Nhảy</button>
  <button onclick="watchAd()">Xem QC +25 xu</button>
  <button onclick="buySkin()">Mua Skin (50 xu)</button>
</div>

<p>Xu: <span id="coins">0</span></p>
<p>Skin: <span id="skin">Basic</span></p>

<!-- Menu -->
<div style="position:fixed;bottom:10px;left:10px;">
  <a href="/about.html">About</a> |
  <a href="/privacy.html">Privacy</a>
</div>

<script>
let coins = Number(localStorage.getItem('coins')||0);
let skin = localStorage.getItem('skin')||'Basic';

document.getElementById('coins').textContent = coins;
document.getElementById('skin').textContent = skin;

function jump(){ alert('jump demo'); }

function watchAd(){
  if(typeof adBreak !== 'function'){
    alert('QC chưa sẵn sàng');
    return;
  }

  adBreak({
    type:'reward',
    name:'reward',
    beforeReward: showAdFn => showAdFn(),
    adViewed: () => {
      coins += 25;
      localStorage.setItem('coins', coins);
      document.getElementById('coins').textContent = coins;
      alert('+25 xu');
    }
  });
}

function buySkin(){
  if(coins < 50){
    alert('Không đủ xu');
    return;
  }
  coins -= 50;
  skin = 'Gold';
  localStorage.setItem('coins', coins);
  localStorage.setItem('skin', skin);
  document.getElementById('coins').textContent = coins;
  document.getElementById('skin').textContent = skin;
}
</script>

</body>
</html>
