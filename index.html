<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coin Runner</title>

  <!-- Google Ads -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1057751843910706"
    crossorigin="anonymous"></script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    h1 { margin:10px; }

    canvas {
      background:#111827;
      border-radius:10px;
      margin-top:10px;
    }

    button {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

    .panel { margin-top:10px; }

    .stats { margin-top:10px; }

    .menu {
      position:fixed;
      bottom:10px;
      left:10px;
      font-size:14px;
    }

    .overlay {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.7);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .box {
      background:#020617;
      padding:20px;
      border-radius:15px;
    }
  </style>
</head>
<body>

<h1>🎮 Coin Runner</h1>

<!-- ADS -->
<div>
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-1057751843910706"
       data-ad-slot="1398284710"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<canvas id="game" width="400" height="300"></canvas>

<div class="panel">
  <button onclick="startGame()">▶ Bắt đầu / Chơi lại</button>
  <button onclick="jump()">⬆ Nhảy</button>
  <button onclick="watchAd()">📺 Xem QC +25 xu</button>
  <button onclick="buySkin()">💰 Mua Skin (50 xu)</button>
</div>

<div class="stats">
  Xu: <span id="coins">0</span> |
  Skin: <span id="skin">Basic</span>
</div>

<div class="menu">
  <a href="/about.html">About</a> |
  <a href="/privacy.html">Privacy</a>
</div>

<!-- GAME OVER -->
<div id="gameOver" class="overlay" style="display:none;">
  <div class="box">
    <h2>💀 Game Over</h2>
    <button onclick="startGame()">Chơi lại</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let player, obstacles, running;

let coins = Number(localStorage.getItem('coins')||0);
let skin = localStorage.getItem('skin')||'Basic';

function updateUI(){
  document.getElementById('coins').textContent = coins;
  document.getElementById('skin').textContent = skin;
}
updateUI();

function startGame(){
  player = {x:50,y:200,w:30,h:30,vy:0};
  obstacles = [];
  running = true;
  document.getElementById('gameOver').style.display='none';
}

function jump(){
  if(player && player.y>=200){
    player.vy=-10;
  }
}

window.addEventListener('keydown',e=>{
  if(e.code==='Space') jump();
});

function spawn(){
  if(Math.random()<0.02){
    obstacles.push({x:400,y:220,w:20,h:20});
  }
}

function loop(){
  ctx.clearRect(0,0,400,300);

  if(running){
    player.vy+=0.6;
    player.y+=player.vy;

    if(player.y>200){
      player.y=200;
      player.vy=0;
    }

    spawn();

    obstacles.forEach(o=>{
      o.x-=3;

      if(player.x<o.x+o.w &&
         player.x+player.w>o.x &&
         player.y<o.y+o.h &&
         player.y+player.h>o.y){
        running=false;
        document.getElementById('gameOver').style.display='flex';
      }
    });

    obstacles=obstacles.filter(o=>o.x>-20);
  }

  ctx.fillStyle= skin==='Gold'?'gold':'lime';
  ctx.fillRect(player.x,player.y,30,30);

  obstacles.forEach(o=>{
    ctx.fillStyle='red';
    ctx.fillRect(o.x,o.y,o.w,o.h);
  });

  requestAnimationFrame(loop);
}

startGame();
loop();

function watchAd(){
  if(typeof adBreak!=='function'){
    alert('QC chưa sẵn sàng');
    return;
  }

  adBreak({
    type:'reward',
    name:'reward',
    beforeReward:showAdFn=>showAdFn(),
    adViewed:()=>{
      coins+=25;
      localStorage.setItem('coins',coins);
      updateUI();
      alert('+25 xu');
    }
  });
}

function buySkin(){
  if(coins<50){
    alert('Không đủ xu');
    return;
  }
  coins-=50;
  skin='Gold';
  localStorage.setItem('coins',coins);
  localStorage.setItem('skin',skin);
  updateUI();
}
</script>

</body>
</html>
