<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plumber World 5 Maps</title>

<!-- ADS -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1057751843910706" crossorigin="anonymous"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}
canvas{width:100%;max-width:1000px;display:block;margin:auto;background:#38bdf8;border-radius:12px}
.ui{max-width:1000px;margin:auto;padding:10px}
button{padding:10px;margin:5px;border-radius:8px;border:none;font-weight:bold}
</style>
</head>

<body>

<div class="ui">
<button onclick="start()">▶ Start</button>
<span>Level: <b id="lv">0</b></span>
</div>

<canvas id="game" width="960" height="540"></canvas>

<!-- ADS -->
<div style="max-width:1000px;margin:auto">
<ins class="adsbygoogle"
 style="display:block"
 data-ad-client="ca-pub-1057751843910706"
 data-ad-slot="6646434479"
 data-ad-format="auto"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
</div>

<script>
const c=document.getElementById("game"),ctx=c.getContext("2d");
let keys={},level=0,state="menu";

let player,solids=[],blocks=[],enemies=[],mushrooms=[],spikes=[],movers=[],flag;

function rect(a,b){
 return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

function start(){
 level=0;
 loadLevel();
 state="play";
}

function next(){
 level++;
 if(level>4){alert("WIN");level=0;}
 loadLevel();
}

function loadLevel(){
 solids=[];blocks=[];enemies=[];mushrooms=[];spikes=[];movers=[];
 player={x:50,y:300,w:30,h:40,vx:0,vy:0,on:false,big:false};

 document.getElementById("lv").innerText=level;

 // ===== MAP 0 =====
 if(level==0){
   for(let i=0;i<40;i++)solids.push({x:i*50,y:450,w:50,h:100});
   blocks.push({x:400,y:250,w:40,h:40,used:false});
 }

 // ===== MAP 1 =====
 if(level==1){
   for(let i=0;i<40;i++)solids.push({x:i*50,y:450,w:50,h:100});
   solids.push({x:300,y:350,w:200,h:20});
   solids.push({x:600,y:300,w:200,h:20});
   blocks.push({x:650,y:220,w:40,h:40,used:false});
 }

 // ===== MAP 2 (HỐ + SPRING) =====
 if(level==2){
   for(let i=0;i<15;i++)solids.push({x:i*50,y:450,w:50,h:100});
   for(let i=20;i<40;i++)solids.push({x:i*50,y:450,w:50,h:100});
   blocks.push({x:300,y:250,w:40,h:40,used:false});
 }

 // ===== MAP 3 (SPIKE) =====
 if(level==3){
   for(let i=0;i<40;i++)solids.push({x:i*50,y:450,w:50,h:100});
   spikes.push({x:500,y:430,w:40,h:20});
   blocks.push({x:550,y:250,w:40,h:40,used:false});
 }

 // ===== MAP 4 (MOVING) =====
 if(level==4){
   for(let i=0;i<15;i++)solids.push({x:i*50,y:450,w:50,h:100});
   for(let i=20;i<40;i++)solids.push({x:i*50,y:450,w:50,h:100});
   movers.push({x:400,y:300,w:120,h:20,vx:2});
   blocks.push({x:420,y:220,w:40,h:40,used:false});
 }

 flag={x:1800,y:300,w:20,h:150};
}

function update(){
 if(state!="play")return;

 // movement
 player.vx=0;
 if(keys["ArrowLeft"])player.vx=-4;
 if(keys["ArrowRight"])player.vx=4;
 if(keys[" "] && player.on){player.vy=-12;player.on=false;}

 player.vy+=0.6;

 player.x+=player.vx;
 player.y+=player.vy;
 player.on=false;

 // collision
 for(let s of solids){
  if(rect(player,s)){
    if(player.vy>0){
      player.y=s.y-player.h;
      player.vy=0;
      player.on=true;
    }
  }
 }

 // block
 for(let b of blocks){
  if(!b.used && rect(player,{x:b.x,y:b.y+40,w:b.w,h:5})){
    b.used=true;
    mushrooms.push({x:b.x,y:b.y-30,w:30,h:30,vx:2,vy:-5});
  }
 }

 // mushroom
 for(let m of mushrooms){
  m.vy+=0.5;
  m.x+=m.vx;
  m.y+=m.vy;

  for(let s of solids){
    if(rect(m,s)){
      m.y=s.y-m.h;
      m.vy=0;
    }
  }

  if(rect(player,m)){
    player.big=true;
    m.dead=true;
  }
 }
 mushrooms=mushrooms.filter(m=>!m.dead);

 // spike
 for(let s of spikes){
  if(rect(player,s)) state="menu";
 }

 // mover
 for(let m of movers){
  m.x+=m.vx;
  if(m.x<300||m.x>600)m.vx*=-1;

  if(rect(player,m)){
    player.y=m.y-player.h;
    player.on=true;
    player.x+=m.vx;
  }
 }

 // flag
 if(rect(player,flag)) next();
}

function draw(){
 ctx.clearRect(0,0,960,540);

 // ground
 ctx.fillStyle="green";
 solids.forEach(s=>ctx.fillRect(s.x,s.y,s.w,s.h));

 // block
 ctx.fillStyle="yellow";
 blocks.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));

 // mushroom
 ctx.fillStyle="red";
 mushrooms.forEach(m=>ctx.fillRect(m.x,m.y,m.w,m.h));

 // spike
 ctx.fillStyle="white";
 spikes.forEach(s=>ctx.fillRect(s.x,s.y,s.w,s.h));

 // mover
 ctx.fillStyle="purple";
 movers.forEach(m=>ctx.fillRect(m.x,m.y,m.w,m.h));

 // flag
 ctx.fillStyle="lime";
 ctx.fillRect(flag.x,flag.y,flag.w,flag.h);

 // player
 ctx.fillStyle=player.big?"orange":"blue";
 ctx.fillRect(player.x,player.y,player.w,player.h);
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

loadLevel();
loop();
</script>

</body>
</html>
